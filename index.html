<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merry Christmas</title>
    <style type="text/css">
        .video-box {
            padding-bottom: 56.25%;
            width: 100%;
            position: relative;
        }
        .video-box video {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            object-fit: fill;
        }
    </style>
</head>
<body style="overflow:hidden"></body>
<body>
    <div class="video-box">
    <!--
    autoplay	autoplay如果出现该属性，则视频在就绪后马上播放。
    controls	controls如果出现该属性，则向用户显示控件，比如播放按钮。
    loop	loop如果出现该属性，则当媒介文件完成播放后再次开始播放。
    muted	muted规定视频的音频输出应该被静音。
    poster	URL	规定视频下载时显示的图像，或者在用户点击播放按钮前显示的图像。
    preload	preload
    如果出现该属性，则视频在页面加载时进行加载，并预备播放。
    如果使用 "autoplay"，则忽略该属性。
    src	 url要播放的视频的 URL。
    width	pixels设置视频播放器的宽度。
    height	pixels设置视频播放器的高度。-->
        <video class="video_back" src="./Christmas.mp4" autoplay="autoplay" loop="loop">
        </video>
    </div>
</body>
</html>
